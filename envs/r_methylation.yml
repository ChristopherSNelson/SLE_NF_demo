name: r_methylation
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - conda-forge::r-base>=4.3
  - conda-forge::r-quadprog>=1.5
  - conda-forge::r-ggplot2>=3.4
  - conda-forge::r-data.table>=1.15
  - conda-forge::r-dplyr>=1.1
  - conda-forge::r-optparse>=1.7
  - conda-forge::r-matrixstats>=1.2
  - conda-forge::r-tidyr>=1.3
  - conda-forge::r-rcolorbrewer>=1.1
  - conda-forge::r-remotes>=2.4
  # C++ compiler toolchain (needed to install R packages from source)
  - conda-forge::cxx-compiler
  - conda-forge::llvm-openmp
  - conda-forge::gfortran
  # ComBatMet dependencies (installed from GitHub, but needs compiled deps pre-built)
  - bioconda::bioconductor-sva
  - conda-forge::r-betareg
  - conda-forge::r-aod
  - conda-forge::r-rcpparmadillo
